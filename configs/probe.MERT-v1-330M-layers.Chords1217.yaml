seed_everything: 1234
ckpt_path: null

# Chords1217 chord recognition — MERT-v1-330M per-layer sweep.
# MERT token rate is 75 Hz — label_freq set to 75. Frame-level task, no TimeAvgPool.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  accumulate_grad_batches: 8
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 40
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 10
  log_every_n_steps: 50

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: "./output/probe.Chords1217.MERT-v1-330M-layers/checkpoints/"
        filename: "best"
        save_top_k: 1
        monitor: "val/acc"
        mode: "max"
    - class_path: marble.modules.callbacks.LoadLatestCheckpointCallback
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.early_stopping.EarlyStopping
      init_args:
        monitor: "val/acc"
        patience: 7
        mode: "max"
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "MERT-v1-330M / Chords1217"
      tags: ["MERT-v1-330M", "Chords1217", "layer-sweep", "probe", "MERT"]
      job_type: "probe"
      name: "MERT-v1-330M-layers"
      save_dir: "./output/probe.Chords1217.MERT-v1-330M-layers/"


model:
  class_path: marble.tasks.Chords1217.probe.ProbeAudioTask
  init_args:
    sample_rate: 24000
    use_ema: false

    encoder:
      class_path: marble.encoders.MERT.model.MERT_v1_330M_Encoder
      init_args:
        pre_trained_folder: null
        train_mode: freeze
        force_half: false
        preprocess_in_forward: false

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: [6]   # sweep replaces this
      # No TimeAvgPool — frame-level task preserves time dimension

    decoders:
      - class_path: marble.modules.decoders.MLPDecoderKeepTime
        init_args:
          in_dim: 1024  # MERT-v1-330M hidden size
          out_dim: 25    # 25 chord classes (maj/min × 12 + no-chord)
          hidden_layers: [256]
          activation_fn:
            class_path: torch.nn.ReLU
          dropout: 0.2

    losses:
      - class_path: marble.tasks.Chords1217.probe.ChordCrossEntropyLoss
        init_args:
          time_dim_mismatch_tol: 5

    metrics:
      train:
        acc:
          class_path: marble.tasks.Chords1217.probe.ChordAccuracy
          init_args:
            time_dim_mismatch_tol: 5
            ignore_index: -1
      val:
        acc:
          class_path: marble.tasks.Chords1217.probe.ChordAccuracy
          init_args:
            time_dim_mismatch_tol: 5
            ignore_index: -1
      test:
        acc:
          class_path: marble.tasks.Chords1217.probe.ChordAccuracy
          init_args:
            time_dim_mismatch_tol: 5
            ignore_index: -1

data:
  class_path: marble.tasks.Chords1217.datamodule.Chords1217DataModule
  init_args:
    batch_size: 8
    num_workers: 8

    audio_transforms:
      train:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: "m-a-p/MERT-v1-330M"
            squeeze: true
      val:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: "m-a-p/MERT-v1-330M"
            squeeze: true
      test:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: "m-a-p/MERT-v1-330M"
            squeeze: true

    train:
      class_path: marble.tasks.Chords1217.datamodule.Chords1217AudioTrain
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15
        min_clip_ratio: 0.1
        channel_mode: random
        jsonl: data/Chords1217/Chords1217.train.jsonl
        label_freq: 75
        backend: "soundfile"
    val:
      class_path: marble.tasks.Chords1217.datamodule.Chords1217AudioVal
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15
        min_clip_ratio: 0.1
        channel_mode: mix
        jsonl: data/Chords1217/Chords1217.val.jsonl
        label_freq: 75
        backend: "soundfile"
    test:
      class_path: marble.tasks.Chords1217.datamodule.Chords1217AudioTest
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15
        min_clip_ratio: 0.1
        channel_mode: mix
        jsonl: data/Chords1217/Chords1217.test.jsonl
        label_freq: 75
        backend: "soundfile"

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3

lr_scheduler:
  class_path: lightning.pytorch.cli.ReduceLROnPlateau
  init_args:
    mode: "max"
    factor: 0.5
    patience: 5
    monitor: "val/acc"
