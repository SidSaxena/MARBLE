seed_everything: 1234
ckpt_path: null

# HookTheory key estimation — MERT-v1-95M per-layer sweep.
# Settings match probe.OMARRQ-multifeature25hz.HookTheoryKey.yaml for fair comparison.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  accumulate_grad_batches: 8
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 40
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 10
  log_every_n_steps: 50

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: "./output/probe.HookTheoryKey.MERT-v1-95M-layers/checkpoints/"
        filename: "best"
        save_top_k: 1
        monitor: "val/weighted_score"
        mode: "max"
    - class_path: marble.modules.callbacks.LoadLatestCheckpointCallback
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.early_stopping.EarlyStopping
      init_args:
        monitor: "val/weighted_score"
        patience: 7
        mode: "max"
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "MERT-v1-95M / HookTheoryKey"
      tags: ["MERT-v1-95M", "HookTheoryKey", "layer-sweep", "probe"]
      job_type: "probe"
      name: "MERT-v1-95M-layers"
      save_dir: "./output/probe.HookTheoryKey.MERT-v1-95M-layers/"


model:
  class_path: marble.tasks.HookTheoryKey.probe.ProbeAudioTask
  init_args:
    sample_rate: 24000
    use_ema: false

    encoder:
      class_path: marble.encoders.MERT.model.MERT_v1_95M_Encoder
      init_args:
        pre_trained_folder: null
        train_mode: freeze
        force_half: false
        preprocess_in_forward: false

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: [6]   # sweep replaces this
      - class_path: marble.modules.transforms.TimeAvgPool

    decoders:
      - class_path: marble.modules.decoders.MLPDecoder
        init_args:
          in_dim: 768    # MERT-v1-95M hidden size
          out_dim: 24    # 24 keys (12 major + 12 minor)
          hidden_layers: [256]
          activation_fn:
            class_path: torch.nn.ReLU
          dropout: 0.2

    losses:
      - class_path: torch.nn.CrossEntropyLoss
        init_args:
          reduction: mean

    metrics:
      train:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            num_classes: 24
            task: multiclass
        weighted_score:
          class_path: marble.tasks.HookTheoryKey.probe.KeyWeightedScore
      val:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            num_classes: 24
            task: multiclass
        weighted_score:
          class_path: marble.tasks.HookTheoryKey.probe.KeyWeightedScore
      test:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            num_classes: 24
            task: multiclass
        weighted_score:
          class_path: marble.tasks.HookTheoryKey.probe.KeyWeightedScore

data:
  class_path: marble.tasks.HookTheoryKey.datamodule.HookTheoryKeyDataModule
  init_args:
    batch_size: 16
    num_workers: 8

    audio_transforms:
      train:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: null
            squeeze: true
      val:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: null
            squeeze: true
      test:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: null
            squeeze: true

    train:
      class_path: marble.tasks.HookTheoryKey.datamodule.HookTheoryKeyAudioTrain
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15
        min_clip_ratio: 0.1
        channel_mode: random
        jsonl: data/HookTheory/HookTheoryKey.train.jsonl
        maj_minor_only: true
    val:
      class_path: marble.tasks.HookTheoryKey.datamodule.HookTheoryKeyAudioVal
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15
        min_clip_ratio: 0.1
        channel_mode: mix
        jsonl: data/HookTheory/HookTheoryKey.val.jsonl
        maj_minor_only: true
    test:
      class_path: marble.tasks.HookTheoryKey.datamodule.HookTheoryKeyAudioTest
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15
        min_clip_ratio: 0.1
        channel_mode: mix
        jsonl: data/HookTheory/HookTheoryKey.test.jsonl
        maj_minor_only: true

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3

lr_scheduler:
  class_path: lightning.pytorch.cli.ReduceLROnPlateau
  init_args:
    mode: "max"
    factor: 0.5
    patience: 5
    monitor: "val/weighted_score"
