seed_everything: 1234
ckpt_path: null

# VGMIDI-TVar zero-shot theme/variation retrieval — MERT-v1-330M per-layer sweep.
# max_epochs=0: no training. test stage embeds all renders and computes MAP.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 0
  num_sanity_val_steps: 0

  callbacks: []
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "MERT-v1-330M / VGMIDITVar"
      tags: ["MERT-v1-330M", "VGMIDITVar", "layer-sweep", "probe", "mean-all", "MERT"]
      job_type: "probe"
      name: "layer-meanall-fit"
      save_dir: "./output/probe.VGMIDITVar.MERT-v1-330M-meanall/"


model:
  class_path: marble.tasks.VGMIDITVar.probe.CoverRetrievalTask
  init_args:
    sample_rate: 24000
    cache_embeddings: true

    encoder:
      class_path: marble.encoders.MERT.model.MERT_v1_330M_Encoder
      init_args:
        pre_trained_folder: null
        train_mode: freeze
        force_half: false
        preprocess_in_forward: false

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: ["0..24"]
          mode: mean
      - class_path: marble.modules.transforms.TimeAvgPool


data:
  class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarDataModule
  init_args:
    batch_size: 8
    num_workers: 4

    audio_transforms:
      train:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: "m-a-p/MERT-v1-330M"
            squeeze: true
      val:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: "m-a-p/MERT-v1-330M"
            squeeze: true
      test:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: "m-a-p/MERT-v1-330M"
            squeeze: true

    train:
      class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarAudioDummy
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/VGMIDITVar/VGMIDITVar.jsonl
        backend: null
    val:
      class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarAudioDummy
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/VGMIDITVar/VGMIDITVar.jsonl
        backend: null
    test:
      class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarAudioAll
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/VGMIDITVar/VGMIDITVar.jsonl
        backend: null

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
