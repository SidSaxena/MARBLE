# Auto-generated from configs/probe.OMARRQ-multifeature-25hz.VGMIDITVar.yaml
# Layer-sweep config for MuQ encoder. MuQ has 13 hidden
# states (1 input + 12 transformer); use --num-layers 13.
# OMARRQ_FeatureExtractor is reused only for its mono-squeeze behavior;
# it's encoder-agnostic.

seed_everything: 1234
ckpt_path: null

# VGMIDI-TVar zero-shot theme/variation retrieval — MuQ per-layer sweep.
# max_epochs=0: no training. test stage embeds all renders and computes MAP.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 0
  num_sanity_val_steps: 0

  callbacks: []
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "MuQ / VGMIDITVar"
      tags: ["MuQ", "VGMIDITVar", "layer-sweep", "probe"]
      job_type: "probe"
      name: "MuQ"
      save_dir: "./output/probe.VGMIDITVar.MuQ/"


model:
  class_path: marble.tasks.VGMIDITVar.probe.CoverRetrievalTask
  init_args:
    sample_rate: 24000
    cache_embeddings: true

    encoder:
      class_path: marble.encoders.MuQ.model.MuQ_Encoder
    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: [6]   # sweep replaces this
      - class_path: marble.modules.transforms.TimeAvgPool


data:
  class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarDataModule
  init_args:
    batch_size: 8
    num_workers: 4

    audio_transforms:
      train:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      val:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      test:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor

    train:
      class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarAudioDummy
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/VGMIDITVar/VGMIDITVar.jsonl
        backend: null
    val:
      class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarAudioDummy
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/VGMIDITVar/VGMIDITVar.jsonl
        backend: null
    test:
      class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarAudioAll
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/VGMIDITVar/VGMIDITVar.jsonl
        backend: null

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
