seed_everything: 1234
ckpt_path: null

# ── OMAR-RQ-multifeature-25hz × VGMIDITVar — 24-layer sweep ────────────────
# Uses the WINNING variant from the variant sweep:
#   -25hz-fsq      : 0.0737 MAP (FSQ kills retrieval geometry)
#   -multifeature  : 0.1708 MAP (non-fsq, 18.75 Hz)
#   -multifeature-25hz : 0.1728 MAP (non-fsq, 25 Hz) — picked for layer sweep
#   -base          : 0.1649 MAP (mel input, 16 kHz)
#
# The two non-fsq variants are within noise of each other; -25hz wins by
# 1.2%. Companion to probe.OMARRQ-multifeature-nonfsq.VGMIDITVar.yaml
# (mean-of-all-24). This config is for the per-layer sweep via
# gen_sweep_configs.py which mutates `layers: [N]` per layer.
#
# We expect REAL layer specialization (unlike the FSQ variant which was
# completely flat across all 24 layers) — non-FSQ training preserves
# layer-wise variance. Predicted: a mid-layer peak in the 0.18–0.22 range.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 0
  num_sanity_val_steps: 0

  callbacks: []
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "OMARRQ-multifeature-25hz-nonfsq / VGMIDITVar"
      tags: ["OMARRQ-multifeature-25hz", "VGMIDITVar", "layer-sweep", "probe", "mean-all"]
      job_type: "probe"
      name: "meanall-fit"
      save_dir: "./output/probe.VGMIDITVar.OMARRQ-multifeature-25hz-nonfsq-meanall/"


model:
  class_path: marble.tasks.VGMIDITVar.probe.CoverRetrievalTask
  init_args:
    sample_rate: 24000

    encoder:
      class_path: marble.encoders.OMAR_RQ.model.OMARRQ_Multifeature25hz_Encoder
      init_args:
        model_id: "mtg-upf/omar-rq-multifeature-25hz"

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: ["0..23"]
          mode: mean
      - class_path: marble.modules.transforms.TimeAvgPool

data:
  class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarDataModule
  init_args:
    batch_size: 8
    num_workers: 4

    audio_transforms:
      train:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      val:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      test:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor

    train:
      class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarAudioDummy
      init_args:
        jsonl: data/VGMIDITVar/VGMIDITVar.jsonl
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
    val:
      class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarAudioDummy
      init_args:
        jsonl: data/VGMIDITVar/VGMIDITVar.jsonl
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
    test:
      class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarAudioAll
      init_args:
        jsonl: data/VGMIDITVar/VGMIDITVar.jsonl
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
