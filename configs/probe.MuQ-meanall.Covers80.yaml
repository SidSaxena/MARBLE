# Auto-generated from configs/probe.OMARRQ-multifeature-25hz.Covers80.yaml
# Layer-sweep config for MuQ encoder. MuQ has 13 hidden
# states (1 input + 12 transformer); use --num-meanall 13.
# OMARRQ_FeatureExtractor is reused only for its mono-squeeze behavior;
# it's encoder-agnostic.

seed_everything: 1234
ckpt_path: null

# ── Covers80 is a RETRIEVAL task — no probe training ─────────────────────────
# fit:  max_epochs=0 → instant no-op.
# test: embed all 160 tracks, compute cosine-similarity MAP.
# No ModelCheckpoint / EarlyStopping / LoadLatestCheckpointCallback needed.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 0    # zero-shot retrieval — skip training entirely
  num_sanity_val_steps: 0

  callbacks: []  # no training → no checkpoint / early-stop / lr-monitor needed
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "MuQ / Covers80"
      tags: ["MuQ", "Covers80", "probe", "mean-all", "layer-sweep"]
      job_type: "probe"
      name: "layer-meanall-fit"
      save_dir: "./output/probe.Covers80.MuQ-meanall/"


model:
  class_path: marble.tasks.Covers80.probe.CoverRetrievalTask
  init_args:
    sample_rate: 24000
    cache_embeddings: true

    encoder:
      class_path: marble.encoders.MuQ.model.MuQ_Encoder
    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: ["0..12"]
          mode: mean
      - class_path: marble.modules.transforms.TimeAvgPool

data:
  class_path: marble.tasks.Covers80.datamodule.Covers80DataModule
  init_args:
    batch_size: 8
    num_workers: 4

    audio_transforms:
      train:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      val:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      test:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor

    # train / val point to the same full-dataset JSONL (max_epochs=0, never loaded)
    train:
      class_path: marble.tasks.Covers80.datamodule.Covers80AudioDummy
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 30.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/Covers80/Covers80.test.jsonl
        backend: null
    val:
      class_path: marble.tasks.Covers80.datamodule.Covers80AudioDummy
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 30.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/Covers80/Covers80.test.jsonl
        backend: null
    test:
      class_path: marble.tasks.Covers80.datamodule.Covers80AudioAll
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 30.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/Covers80/Covers80.test.jsonl
        backend: null

# Optimizer is configured but never used (max_epochs=0).
optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
