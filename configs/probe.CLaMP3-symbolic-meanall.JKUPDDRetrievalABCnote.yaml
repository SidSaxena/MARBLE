seed_everything: 1234
ckpt_path: null

# JKUPDD within-piece motif retrieval — CLaMP3 symbolic, meanall baseline.
# ABCnote VARIANT (content-confound-corrected; see
# probe.CLaMP3-symbolic-layers.JKUPDDRetrievalABCnote.yaml): mean-of-all-13-layers
# reference for the note-level ABC per-layer sweep. Same 66 occurrences / 15
# groups as the matched-MTF baseline; tokenised from the note-level
# (motif-only, single-voice) interleaved-ABC instead of MIDI->MTF.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 0
  num_sanity_val_steps: 0

  callbacks:
    - class_path: marble.modules.callbacks.LogSweepCoordsCallback
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "CLaMP3-symbolic / JKUPDDRetrievalABCnote"
      tags: ["CLaMP3-symbolic", "JKUPDDRetrievalABCnote", "layer-sweep", "probe", "symbolic", "abc", "note-level", "mean-all"]
      job_type: "test"
      name: "layer-meanall-test"
      save_dir: "./output/probe.JKUPDDRetrievalABCnote.CLaMP3-symbolic-meanall/"


model:
  class_path: marble.tasks.JKUPDDRetrieval.probe.JKUPDDRetrievalTask
  init_args:
    sample_rate: 24000
    cache_embeddings: true
    log_extended_retrieval_metrics: true

    encoder:
      class_path: marble.encoders.CLaMP3.model.CLaMP3_Symbolic_Encoder

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: ["0..12"]
          mode: mean
      - class_path: marble.modules.transforms.TimeAvgPool


data:
  class_path: marble.tasks.JKUPDDRetrieval.datamodule.JKUPDDRetrievalABCDataModule
  init_args:
    batch_size: 8
    num_workers: 4

    audio_transforms:
      train: []
      val:   []
      test:  []

    train:
      class_path: marble.tasks.JKUPDDRetrieval.datamodule.JKUPDDRetrievalABCDummy
    val:
      class_path: marble.tasks.JKUPDDRetrieval.datamodule.JKUPDDRetrievalABCDummy
    test:
      class_path: marble.tasks.JKUPDDRetrieval.datamodule.JKUPDDRetrievalABCTest

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
