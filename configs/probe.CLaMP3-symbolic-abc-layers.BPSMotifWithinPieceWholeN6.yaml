seed_everything: 1234
ckpt_path: null

# BPS-Motif WITHIN-PIECE WHOLE-PIECE-CONTEXT same-motif retrieval — CLaMP3
# symbolic per-layer sweep, ABC INPUT.
#
# The whole-piece-context counterpart of
# probe.CLaMP3-symbolic-abc-layers.BPSMotifWithinPieceN4.yaml (clip-isolated).
# SAME metric (compute_within_group_multilabel_map), SAME windows / labels /
# occurrence ids — the ONLY difference is the ENCODING: instead of tokenising
# each 4-bar window's own ABC slice in isolation, the probe encodes the WHOLE
# movement ONCE at per-patch resolution (segmenting >512 — NOT truncating, or
# most of a 144-1250-patch movement would be silently dropped), maps
# patches->physical bars, and pools each window's bar-patches IN MOVEMENT CONTEXT.
# This reproduces the leitmotifs whole-piece prototype, which peaked DEEP (~L8:
# raw L8~0.598, L2~0.498) — vs the clip-isolated task's shallow-mid (~L4) peak.
# Zero-shot (max_epochs=0). wandb group
# `CLaMP3-symbolic-abc / BPSMotifWithinPieceWholeN6`. The sweep runner overrides
# `layers: [6]` per layer. Build the dataset first:
#   uv run python scripts/data/build_bps_motif_within_piece.py --window 6 --whole

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 0
  num_sanity_val_steps: 0

  callbacks:
    - class_path: marble.modules.callbacks.LogSweepCoordsCallback
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "CLaMP3-symbolic-abc / BPSMotifWithinPieceWhole"
      tags: ["CLaMP3-symbolic-abc", "BPSMotifWithinPieceWholeN6", "layer-sweep", "probe", "symbolic", "abc-input", "within-piece", "whole-piece"]
      job_type: "test"
      name: "layer-6-test"
      save_dir: "./output/probe.BPSMotifWithinPieceWholeN6.CLaMP3-symbolic-abc-layers/"


model:
  class_path: marble.tasks.BPSMotif.probe.BPSMotifWithinPieceWholeTask
  init_args:
    sample_rate: 24000
    cache_embeddings: false
    log_extended_retrieval_metrics: true

    encoder:
      class_path: marble.encoders.CLaMP3.model.CLaMP3_Symbolic_Encoder

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: [6]   # sweep replaces this per-layer
      - class_path: marble.modules.transforms.TimeAvgPool


data:
  class_path: marble.tasks.BPSMotif.datamodule.BPSMotifWithinPieceWholeABCDataModule
  init_args:
    batch_size: 1
    num_workers: 0

    audio_transforms:
      train: []
      val:   []
      test:  []

    train:
      class_path: marble.tasks.BPSMotif.datamodule.BPSMotifWithinPieceWholeABCDummy
      init_args:
        jsonl_template: data/BPS-Motif/BPSMotifWithinPieceWhole.N6.ABC.jsonl
    val:
      class_path: marble.tasks.BPSMotif.datamodule.BPSMotifWithinPieceWholeABCDummy
      init_args:
        jsonl_template: data/BPS-Motif/BPSMotifWithinPieceWhole.N6.ABC.jsonl
    test:
      class_path: marble.tasks.BPSMotif.datamodule.BPSMotifWithinPieceWholeABCTest
      init_args:
        jsonl_template: data/BPS-Motif/BPSMotifWithinPieceWhole.N6.ABC.jsonl

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
