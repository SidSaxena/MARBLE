seed_everything: 1234
ckpt_path: null

# HXMSA (Harmonix Set) structure classification — MuQ per-layer sweep.
# Settings cloned from probe.MuQ-layers.HookTheoryStructure.yaml (2026-05-17); see docs/data/hxmsa_setup.md.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  accumulate_grad_batches: 8
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 40
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 10
  log_every_n_steps: 50

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: "./output/probe.HXMSA.MuQ-layers/checkpoints/"
        filename: "best"
        save_top_k: 1
        monitor: "val/acc"
        mode: "max"
    - class_path: marble.modules.callbacks.LoadLatestCheckpointCallback
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.early_stopping.EarlyStopping
      init_args:
        monitor: "val/acc"
        patience: 7
        mode: "max"
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "MuQ / HXMSA"
      tags: ["MuQ", "HXMSA", "layer-sweep", "probe"]
      job_type: "probe"
      name: "MuQ-layers"
      save_dir: "./output/probe.HXMSA.MuQ-layers/"


model:
  class_path: marble.tasks.HXMSA.probe.ProbeAudioTask
  init_args:
    sample_rate: 24000
    cache_embeddings: true
    use_ema: false

    encoder:
      class_path: marble.encoders.MuQ.model.MuQ_Encoder
      init_args:
        pre_trained_folder: null
        train_mode: freeze

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: [6]   # sweep replaces this
      - class_path: marble.modules.transforms.TimeAvgPool

    decoders:
      - class_path: marble.modules.decoders.MLPDecoder
        init_args:
          in_dim: 1024    # MERT-v1-95M hidden size
          out_dim: 13   # 13 HXMSA functional classes (Harmonix canonical inventory)
          hidden_layers: [256]
          activation_fn:
            class_path: torch.nn.ReLU
          dropout: 0.2

    losses:
      - class_path: torch.nn.CrossEntropyLoss
        init_args:
          reduction: mean

    metrics:
      train:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            task: multiclass
            num_classes: 13
        macro_f1:
          class_path: torchmetrics.classification.MulticlassF1Score
          init_args:
            num_classes: 13
            average: macro
      val:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            task: multiclass
            num_classes: 13
        macro_f1:
          class_path: torchmetrics.classification.MulticlassF1Score
          init_args:
            num_classes: 13
            average: macro
      test:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            task: multiclass
            num_classes: 13
        macro_f1:
          class_path: torchmetrics.classification.MulticlassF1Score
          init_args:
            num_classes: 13
            average: macro

data:
  class_path: marble.tasks.HXMSA.datamodule.HXMSADataModule
  init_args:
    batch_size: 16
    num_workers: 8

    audio_transforms:
      train:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: null
            squeeze: true
      val:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: null
            squeeze: true
      test:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: null
            squeeze: true

    train:
      class_path: marble.tasks.HXMSA.datamodule.HXMSAAudioTrain
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15
        min_clip_ratio: 0.1
        channel_mode: random
        jsonl: data/HXMSA/HXMSA.train.jsonl
    val:
      class_path: marble.tasks.HXMSA.datamodule.HXMSAAudioVal
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15
        min_clip_ratio: 0.1
        channel_mode: mix
        jsonl: data/HXMSA/HXMSA.val.jsonl
    test:
      class_path: marble.tasks.HXMSA.datamodule.HXMSAAudioTest
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15
        min_clip_ratio: 0.1
        channel_mode: mix
        jsonl: data/HXMSA/HXMSA.test.jsonl

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3

lr_scheduler:
  class_path: lightning.pytorch.cli.ReduceLROnPlateau
  init_args:
    mode: "max"
    factor: 0.5
    patience: 5
    monitor: "val/acc"
