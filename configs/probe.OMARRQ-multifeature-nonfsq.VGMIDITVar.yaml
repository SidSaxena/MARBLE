seed_everything: 1234
ckpt_path: null

# ── OMAR-RQ × VGMIDITVar — VARIANT-SWAP experiment ───────────────────────────
# Tests `mtg-upf/omar-rq-multifeature` (non-fsq, 18.75 Hz) vs the default
# `multifeature-25hz-fsq`. On Covers80 the non-fsq variant scored 3.1× the
# MAP of the FSQ variant (0.078 vs 0.025) — does the gain hold on
# VGMIDITVar (a larger, harder theme→variation retrieval set)?
#
# Zero-shot — no training. Mean-aggregates all 24 layers (matches our
# previous meanall test for apples-to-apples comparison vs the -25hz-fsq
# meanall result of 0.0737 raw / 0.0794 centered).

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 0
  num_sanity_val_steps: 0

  callbacks: []
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "OMARRQ-multifeature-nonfsq / VGMIDITVar"
      tags: ["OMARRQ-multifeature", "VGMIDITVar", "variant-swap", "probe", "OMARRQ-multifeature-nonfsq", "OMARRQ", "layer-sweep"]
      job_type: "probe"
      name: "nonfsq-test"
      save_dir: "./output/probe.VGMIDITVar.OMARRQ-multifeature-nonfsq/"


model:
  class_path: marble.tasks.VGMIDITVar.probe.CoverRetrievalTask
  init_args:
    sample_rate: 24000
    cache_embeddings: true

    encoder:
      class_path: marble.encoders.OMAR_RQ.model.OMARRQ_Multifeature25hz_Encoder
      init_args:
        model_id: "mtg-upf/omar-rq-multifeature"

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: ["0..23"]
          mode: mean
      - class_path: marble.modules.transforms.TimeAvgPool

data:
  class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarDataModule
  init_args:
    batch_size: 8
    num_workers: 4

    audio_transforms:
      train:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      val:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      test:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor

    train:
      class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarAudioDummy
      init_args:
        jsonl: data/VGMIDITVar/VGMIDITVar.jsonl
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
    val:
      class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarAudioDummy
      init_args:
        jsonl: data/VGMIDITVar/VGMIDITVar.jsonl
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
    test:
      class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarAudioAll
      init_args:
        jsonl: data/VGMIDITVar/VGMIDITVar.jsonl
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
