seed_everything: 1234
ckpt_path: null # to resume

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  accumulate_grad_batches: 8
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 40
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 10
  log_every_n_steps: 50

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: "./output/probe.NSynth.OMARRQ-multifeature-25hz-meanall/checkpoints/"
        filename: "best"
        save_top_k: 1
        monitor: "val/acc"
        mode: "max"
    - class_path: marble.modules.callbacks.LoadLatestCheckpointCallback # for testing
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.early_stopping.EarlyStopping
      init_args:
        monitor: "val/acc"
        patience: 7
        mode: "max"
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "OMARRQ-multifeature-25hz / NSynth"
      tags: ["NSynth", "probe", "mean-all", "OMARRQ-multifeature-25hz", "layer-sweep", "OMARRQ"]
      job_type: "probe"
      name: "layer-meanall-fit"
      save_dir: "./output/probe.NSynth.OMARRQ-multifeature-25hz-meanall/"


model:
  class_path: marble.tasks.NSynth.probe.ProbeAudioTask
  init_args:
    sample_rate: 24000   # OMARRQ input rate; dataset resamples 16kHz → 24kHz
    cache_embeddings: true
    use_ema: false

    encoder:
      class_path: marble.encoders.OMAR_RQ.model.OMARRQ_Multifeature25hz_Encoder
      init_args:
        model_id: "mtg-upf/omar-rq-multifeature-25hz"
    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: ["0..23"]
          mode: mean
      - class_path: marble.modules.transforms.TimeAvgPool

    decoders:
      - class_path: marble.modules.decoders.MLPDecoder
        init_args:
          in_dim: 1024   # OMARRQ embed_dim
          out_dim: 88    # MIDI pitches 21–108 → 88 classes
          hidden_layers: [256]
          activation_fn:
            class_path: torch.nn.ReLU
          dropout: 0.2

    losses:
      - class_path: torch.nn.CrossEntropyLoss
        init_args:
          reduction: mean

    metrics:
      train:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            task: multiclass
            num_classes: 88
      val:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            task: multiclass
            num_classes: 88
      test:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            task: multiclass
            num_classes: 88

data:
  class_path: marble.tasks.NSynth.datamodule.NSynthDataModule
  init_args:
    batch_size: 32
    num_workers: 8

    audio_transforms:
      train:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      val:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      test:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor

    train:
      class_path: marble.tasks.NSynth.datamodule.NSynthAudioTrain
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 4.0
        channel_mode: first
        jsonl: data/NSynth/NSynth.train.jsonl
        max_samples: 50000   # cap at 50K to keep sweep tractable (~289K total)
    val:
      class_path: marble.tasks.NSynth.datamodule.NSynthAudioVal
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 4.0
        channel_mode: first
        jsonl: data/NSynth/NSynth.val.jsonl
    test:
      class_path: marble.tasks.NSynth.datamodule.NSynthAudioTest
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 4.0
        channel_mode: first
        jsonl: data/NSynth/NSynth.test.jsonl

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3

lr_scheduler:
  class_path: lightning.pytorch.cli.ReduceLROnPlateau
  init_args:
    mode: "max"
    factor: 0.5
    patience: 5
    monitor: "val/acc"
