seed_everything: 1234
ckpt_path: null

# JKUPDD within-piece motif retrieval — CLaMP3 symbolic, meanall baseline.
#
# Zero-shot: max_epochs=0. Embed every annotated pattern-occurrence window in
# the test set, compute pairwise cosine similarity, and report MAP / MAP@1 /
# MRR. Relevance: same (piece, annotator, pattern) group — the mean-of-all-13-
# layers reference for the per-layer JKUPDD sweep. SMALL benchmark (~165
# occurrence windows, 5 cross-composer pieces).

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 0
  num_sanity_val_steps: 0

  callbacks:
    - class_path: marble.modules.callbacks.LogSweepCoordsCallback
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "CLaMP3-symbolic / JKUPDDRetrieval"
      tags: ["CLaMP3-symbolic", "JKUPDDRetrieval", "layer-sweep", "probe", "symbolic", "mean-all"]
      job_type: "test"
      name: "layer-meanall-test"
      save_dir: "./output/probe.JKUPDDRetrieval.CLaMP3-symbolic-meanall/"


model:
  class_path: marble.tasks.JKUPDDRetrieval.probe.JKUPDDRetrievalTask
  init_args:
    sample_rate: 24000
    cache_embeddings: true
    # Full retrieval suite (map@1, mrr, recall@{1,5,10,50,100}, hit_rate@K +
    # _centered/_whitened) on top of the default trim set. The test pool is
    # SMALL (~165 windows) — high-K recall is sparsely populated.
    log_extended_retrieval_metrics: true

    encoder:
      class_path: marble.encoders.CLaMP3.model.CLaMP3_Symbolic_Encoder

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: ["0..12"]
          mode: mean
      - class_path: marble.modules.transforms.TimeAvgPool


data:
  class_path: marble.tasks.JKUPDDRetrieval.datamodule.JKUPDDRetrievalDataModule
  init_args:
    batch_size: 8
    num_workers: 4

    audio_transforms:
      train: []
      val:   []
      test:  []

    train:
      class_path: marble.tasks.JKUPDDRetrieval.datamodule.JKUPDDRetrievalDummy
    val:
      class_path: marble.tasks.JKUPDDRetrieval.datamodule.JKUPDDRetrievalDummy
    test:
      class_path: marble.tasks.JKUPDDRetrieval.datamodule.JKUPDDRetrievalTest

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
