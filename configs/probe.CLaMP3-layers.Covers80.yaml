seed_everything: 1234
ckpt_path: null

# Covers80 zero-shot retrieval — see probe.OMARRQ-multifeature25hz.Covers80.yaml
# for full explanation.  This variant uses CLaMP3 (13 layers, 768-dim).

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: 16
  max_epochs: 0
  num_sanity_val_steps: 0

  callbacks: []  # no training → no checkpoint / early-stop / lr-monitor needed
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      name: "probe.Covers80.CLaMP3-layers"
      save_dir: "./output/probe.Covers80.CLaMP3-layers/"


model:
  class_path: marble.tasks.Covers80.probe.CoverRetrievalTask
  init_args:
    sample_rate: 24000

    encoder:
      class_path: marble.encoders.CLaMP3.model.CLaMP3_Encoder
      init_args:
        pre_trained_folder: null
        train_mode: freeze

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: [6]   # sweep replaces this
      - class_path: marble.modules.transforms.TimeAvgPool

data:
  class_path: marble.tasks.Covers80.datamodule.Covers80DataModule
  init_args:
    batch_size: 8
    num_workers: 4

    audio_transforms:
      train:
        - class_path: marble.encoders.CLaMP3.model.CLaMP3_FeatureExtractor
          init_args:
            pre_trained_folder: null
            squeeze: true
      val:
        - class_path: marble.encoders.CLaMP3.model.CLaMP3_FeatureExtractor
          init_args:
            pre_trained_folder: null
            squeeze: true
      test:
        - class_path: marble.encoders.CLaMP3.model.CLaMP3_FeatureExtractor
          init_args:
            pre_trained_folder: null
            squeeze: true

    train:
      class_path: marble.tasks.Covers80.datamodule.Covers80AudioDummy
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 30.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/Covers80/Covers80.test.jsonl
        backend: "ffmpeg"
    val:
      class_path: marble.tasks.Covers80.datamodule.Covers80AudioDummy
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 30.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/Covers80/Covers80.test.jsonl
        backend: "ffmpeg"
    test:
      class_path: marble.tasks.Covers80.datamodule.Covers80AudioAll
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 30.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/Covers80/Covers80.test.jsonl
        backend: "ffmpeg"

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
