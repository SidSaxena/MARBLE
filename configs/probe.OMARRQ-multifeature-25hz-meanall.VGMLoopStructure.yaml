seed_everything: 1234
ckpt_path: null

# VGMLoopStructure loop-type classification — OMARRQ-multifeature-25hz mean-all layers.
# Cloned from probe.OMARRQ-multifeature-25hz-meanall.HookTheoryStructure.yaml; adapted
# for 3-class VGMLoopStructure (through_composed / loop_from_start / intro_loop).
# OMARRQ_FeatureExtractor has NO init_args — do not add any.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  accumulate_grad_batches: 8
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 40
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 10
  log_every_n_steps: 50

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: "./output/probe.VGMLoopStructure.OMARRQ-multifeature-25hz-meanall/checkpoints/"
        filename: "best"
        save_top_k: 1
        save_last: true   # always write last.ckpt so a killed run resumes
        monitor: "val/acc"
        mode: "max"
    - class_path: marble.modules.callbacks.LoadLatestCheckpointCallback
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.early_stopping.EarlyStopping
      init_args:
        monitor: "val/acc"
        patience: 7
        mode: "max"
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "OMARRQ-multifeature-25hz / VGMLoopStructure"
      tags: ["VGMLoopStructure", "probe", "mean-all", "OMARRQ-multifeature-25hz", "layer-sweep", "OMARRQ"]
      job_type: "probe"
      name: "layer-meanall-fit"
      save_dir: "./output/probe.VGMLoopStructure.OMARRQ-multifeature-25hz-meanall/"


model:
  class_path: marble.tasks.VGMLoopStructure.probe.ProbeAudioTask
  init_args:
    sample_rate: 24000
    cache_embeddings: true
    use_ema: false

    encoder:
      class_path: marble.encoders.OMAR_RQ.model.OMARRQ_Multifeature25hz_Encoder
      init_args:
        model_id: "mtg-upf/omar-rq-multifeature-25hz"
        # DO NOT switch to 'reduce-overhead' for OMARRQ — known to error on
        # RoPE einops.repeat due to CUDA Graphs storage aliasing.
        compile_mode: default

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: ["0..23"]
          mode: mean
      - class_path: marble.modules.transforms.TimeAvgPool

    decoders:
      - class_path: marble.modules.decoders.MLPDecoder
        init_args:
          in_dim: 1024   # OMARRQ embed_dim
          out_dim: 3     # 3 loop-type classes
          hidden_layers: [256]
          activation_fn:
            class_path: torch.nn.ReLU
          dropout: 0.2

    losses:
      - class_path: torch.nn.CrossEntropyLoss
        init_args:
          reduction: mean

    metrics:
      train:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            task: multiclass
            num_classes: 3
        f1_macro:
          class_path: torchmetrics.F1Score
          init_args:
            task: multiclass
            num_classes: 3
            average: macro
      val:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            task: multiclass
            num_classes: 3
        f1_macro:
          class_path: torchmetrics.F1Score
          init_args:
            task: multiclass
            num_classes: 3
            average: macro
      test:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            task: multiclass
            num_classes: 3
        f1_macro:
          class_path: torchmetrics.F1Score
          init_args:
            task: multiclass
            num_classes: 3
            average: macro

data:
  class_path: marble.tasks.VGMLoopStructure.datamodule.VGMLoopStructureDataModule
  init_args:
    batch_size: 16
    num_workers: 8

    audio_transforms:
      train:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      val:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      test:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor

    train:
      class_path: marble.tasks.VGMLoopStructure.datamodule.VGMLoopStructureAudioTrain
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15
        min_clip_ratio: 0.1
        channel_mode: random
        jsonl: data/VGM/VGMLoopStructure.train.wav.jsonl
    val:
      class_path: marble.tasks.VGMLoopStructure.datamodule.VGMLoopStructureAudioVal
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15
        min_clip_ratio: 0.1
        channel_mode: mix
        jsonl: data/VGM/VGMLoopStructure.val.wav.jsonl
    test:
      class_path: marble.tasks.VGMLoopStructure.datamodule.VGMLoopStructureAudioTest
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15
        min_clip_ratio: 0.1
        channel_mode: mix
        jsonl: data/VGM/VGMLoopStructure.test.wav.jsonl

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3

lr_scheduler:
  class_path: lightning.pytorch.cli.ReduceLROnPlateau
  init_args:
    mode: "max"
    factor: 0.5
    patience: 5
    monitor: "val/acc"
