seed_everything: 1234
ckpt_path: null

# BPS-Motif WITHIN-PIECE phrase-window same-motif retrieval — CLaMP3 symbolic
# per-layer sweep, ABC INPUT.
#
# Slides N=4-bar phrase windows (stride 1) over each WHOLE movement and measures,
# PER MOVEMENT, whether two windows that share a motif letter retrieve each other
# — genuine within-movement recurrence. The semantics are the
# shuffle-control-validated leitmotifs prototype
# (scripts/eval/bps_within_piece_metric.py::within_movement_map). The metric is
# multi-label + per-movement-gallery + same-occurrence-excluded, so the task
# (BPSMotifWithinPieceTask) overrides the test hooks to call
# compute_within_group_multilabel_map; test/map is the headline. Zero-shot
# (max_epochs=0). wandb group `CLaMP3-symbolic-abc / BPSMotifWithinPieceN3` keeps
# it separate; save_dir carries the within-piece tag. The sweep runner overrides
# `layers: [6]` per layer. Build the dataset first:
#   uv run python scripts/data/build_bps_motif_within_piece.py --window 3

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 0
  num_sanity_val_steps: 0

  callbacks:
    - class_path: marble.modules.callbacks.LogSweepCoordsCallback
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "CLaMP3-symbolic-abc / BPSMotifWithinPiece"
      tags: ["CLaMP3-symbolic-abc", "BPSMotifWithinPieceN3", "layer-sweep", "probe", "symbolic", "abc-input", "within-piece"]
      job_type: "test"
      name: "layer-6-test"
      save_dir: "./output/probe.BPSMotifWithinPieceN3.CLaMP3-symbolic-abc-layers/"


model:
  class_path: marble.tasks.BPSMotif.probe.BPSMotifWithinPieceTask
  init_args:
    sample_rate: 24000
    cache_embeddings: true
    log_extended_retrieval_metrics: true

    encoder:
      class_path: marble.encoders.CLaMP3.model.CLaMP3_Symbolic_Encoder

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: [6]   # sweep replaces this per-layer
      - class_path: marble.modules.transforms.TimeAvgPool


data:
  class_path: marble.tasks.BPSMotif.datamodule.BPSMotifWithinPieceABCDataModule
  init_args:
    batch_size: 8
    num_workers: 4

    audio_transforms:
      train: []
      val:   []
      test:  []

    train:
      class_path: marble.tasks.BPSMotif.datamodule.BPSMotifWithinPieceABCDummy
      init_args:
        jsonl_template: data/BPS-Motif/BPSMotifWithinPiece.N3.ABC.jsonl
    val:
      class_path: marble.tasks.BPSMotif.datamodule.BPSMotifWithinPieceABCDummy
      init_args:
        jsonl_template: data/BPS-Motif/BPSMotifWithinPiece.N3.ABC.jsonl
    test:
      class_path: marble.tasks.BPSMotif.datamodule.BPSMotifWithinPieceABCTest
      init_args:
        jsonl_template: data/BPS-Motif/BPSMotifWithinPiece.N3.ABC.jsonl

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
