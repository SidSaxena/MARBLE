# VARIANT: probe.MuQ-multihead.MedleyDBMelody.yaml + the SUPERB-style
# weighted-sum head (include_weighted: true) and per-epoch gate logging
# (LogLayerWeightsCallback). Run this variant AFTER the base multihead
# config has passed its fold-0 anchor validation: the weighted head, if it
# becomes the best head (likely), drives the shared ReduceLROnPlateau via
# val/acc_rpa_best, so this run's schedule can differ from the validated
# 14-head run. Gates are LayerNormed-mix contributions (Feng et al. TASLP
# 2024); the per-layer heads' own curves remain the ground-truth
# contribution measure (gates-vs-accuracy Spearman rho is weak, ~0.4).
# MULTI-HEAD parallel layer probe for MuQ on MedleyDBMelody (fold 0).
# ONE run trains a per-layer MLP head for EVERY MuQ layer (13 hidden states:
# 1 input + 12 transformer) PLUS a meanall head, off the shared frozen-encoder
# forward — replacing the 13 per-layer runs + 1 meanall run of
# probe.MuQ-layers.MedleyDBMelody.yaml / probe.MuQ-meanall.MedleyDBMelody.yaml.
#
# Derived from probe.MuQ-layers.MedleyDBMelody.yaml. Differences:
#   * LayerSelector keeps ALL 13 layers (["0..12"]) — no per-layer sweep
#     substitution; the (B, 13, T, H) embedding feeds PerLayerHeads.
#   * decoder = PerLayerHeads: 13 heads structurally identical to the
#     single-layer MLPDecoderKeepTime config (+ meanall head, index 13).
#   * task = ProbeAudioTaskMultiHead: per-head summed loss. Update-equivalent
#     to independent runs UNDER CONSTANT LR (proven bitwise in tests); with
#     the shared ReduceLROnPlateau below this is a VALIDATED APPROXIMATION,
#     not a bitwise reproduction — see the scoped invariant in the class and
#     docs/multihead_probe_validation.md. Per-head metrics val/acc_rpa_l{k}
#     + aggregate val/acc_rpa_best (the monitor).
#   * PerHeadBestCheckpoint snapshots each head at ITS OWN best val epoch and
#     restores all heads at test start (per-layer best.ckpt protocol in one
#     run). It MUST be listed after LoadLatestCheckpointCallback.
#   * NO EarlyStopping — deliberate deviation: heads peak at different
#     epochs, so the run always goes the full max_epochs; late-epoch
#     overfitting is harmless because each head is restored to its own best.
#   * ReduceLROnPlateau monitors val/acc_rpa_best — documented deviation
#     (shared LR schedule couples heads); see
#     docs/multihead_probe_validation.md.
#
# Everything the embedding cache keys on (wandb group "MuQ / MedleyDBMelody",
# sample_rate, clip_seconds, audio pipeline, cache_pool_time=false) matches
# the single-head configs EXACTLY, so this run reuses the same frame-level
# (L, T, H) cache the layer sweep built — do not rename the group.
#
# MedleyDBMelody — frame-level melody pitch classification (MARBLE melody task,
# MELODY2 predominant-f0). MuQ token rate is 25 Hz → label_freq=25.
# Frame-level task → NO TimeAvgPool, decoder preserves the time dimension.

seed_everything: 1234
ckpt_path: null

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  accumulate_grad_batches: 4
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 40
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 10
  log_every_n_steps: 50

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: "./output/probe.MedleyDBMelody.MuQ-multihead/checkpoints/"
        filename: "best"
        save_top_k: 1
        save_last: true   # always write last.ckpt so a killed run resumes
        monitor: "val/acc_rpa_best"
        mode: "max"
    - class_path: marble.modules.callbacks.LoadLatestCheckpointCallback
    # AFTER LoadLatestCheckpointCallback: at test start the per-head restore
    # must overwrite the whole-model best.ckpt weights it just loaded.
    - class_path: marble.modules.callbacks.PerHeadBestCheckpoint
      init_args:
        dirpath: "./output/probe.MedleyDBMelody.MuQ-multihead/checkpoints/"
        monitor_base: "acc_rpa"
        mode: "max"
    - class_path: marble.modules.callbacks.LogLayerWeightsCallback
    - class_path: marble.modules.callbacks.LogSweepCoordsCallback
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    # NO EarlyStopping (deliberate deviation from the single-head protocol —
    # see header comment).
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "MuQ / MedleyDBMelody"   # cache key — must match the layer sweep
      tags: ["MuQ", "MedleyDBMelody", "multihead", "probe"]
      job_type: "probe"
      name: "MuQ-multihead-weighted"
      save_dir: "./output/probe.MedleyDBMelody.MuQ-multihead/"


model:
  class_path: marble.tasks.MedleyDBMelody.probe.ProbeAudioTaskMultiHead
  init_args:
    sample_rate: 24000
    use_ema: false
    # Frame-level embedding cache — same settings (and, via the wandb group +
    # audio pipeline, the same cache directory) as the single-head configs.
    # cache_pool_time MUST be false here (frame-level heads need the T axis).
    cache_embeddings: true
    cache_pool_time: false
    # Names the aggregate monitor (val/acc_rpa_best) and the per-head keys
    # the PerHeadBestCheckpoint callback watches (val/acc_rpa_l{k}).
    primary_metric: "acc_rpa"

    encoder:
      class_path: marble.encoders.MuQ.model.MuQ_Encoder
      init_args:
        compile_mode: default
    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: ["0..12"]   # ALL 13 MuQ hidden states — feeds every head
      # NO TimeAvgPool — preserve the time dimension for per-frame labels

    decoders:
      # 13 per-layer heads + 1 meanall head, each structurally IDENTICAL to
      # the MLPDecoderKeepTime config of the single-layer runs (in_dim 1024 →
      # [256] ReLU, dropout 0.2 → 128) — probe-architecture uniformity across
      # layers is load-bearing for comparability (Zaiem et al. 2023).
      - class_path: marble.modules.decoders.PerLayerHeads
        init_args:
          in_dim: 1024   # MuQ hidden size
          out_dim: 128   # full MIDI range 0..127
          num_layers: 13
          hidden_layers: [256]
          activation_fn:
            class_path: torch.nn.ReLU
          dropout: 0.2
          include_meanall: true
          include_weighted: true

    losses:
      # ONE loss — ProbeAudioTaskMultiHead applies it per head and sums.
      - class_path: marble.tasks.MedleyDBMelody.probe.MelodyCrossEntropyLoss
        init_args:
          time_dim_mismatch_tol: 5
          ignore_index: -1

    metrics:
      # Declared ONCE per split (same shape as the single-head configs);
      # the task clones the collection per head → val/acc_rpa_l0..l12,
      # val/acc_rpa_meanall, val/acc_rca_l0.., + val/acc_rpa_best.
      train:
        acc_rpa:
          class_path: marble.tasks.MedleyDBMelody.probe.RawPitchAccuracy
          init_args:
            time_dim_mismatch_tol: 5
            ignore_index: -1
        acc_rca:
          class_path: marble.tasks.MedleyDBMelody.probe.RawChromaAccuracy
          init_args:
            time_dim_mismatch_tol: 5
            ignore_index: -1
      val:
        acc_rpa:
          class_path: marble.tasks.MedleyDBMelody.probe.RawPitchAccuracy
          init_args:
            time_dim_mismatch_tol: 5
            ignore_index: -1
        acc_rca:
          class_path: marble.tasks.MedleyDBMelody.probe.RawChromaAccuracy
          init_args:
            time_dim_mismatch_tol: 5
            ignore_index: -1
      test:
        acc_rpa:
          class_path: marble.tasks.MedleyDBMelody.probe.RawPitchAccuracy
          init_args:
            time_dim_mismatch_tol: 5
            ignore_index: -1
        acc_rca:
          class_path: marble.tasks.MedleyDBMelody.probe.RawChromaAccuracy
          init_args:
            time_dim_mismatch_tol: 5
            ignore_index: -1

data:
  class_path: marble.tasks.MedleyDBMelody.datamodule.MedleyDBMelodyDataModule
  init_args:
    batch_size: 16
    num_workers: 8

    audio_transforms:
      train:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      val:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      test:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor

    train:
      class_path: marble.tasks.MedleyDBMelody.datamodule.MedleyDBMelodyTrain
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
        fold_idx: 0
        label_freq: 25
    val:
      class_path: marble.tasks.MedleyDBMelody.datamodule.MedleyDBMelodyVal
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
        fold_idx: 0
        label_freq: 25
    test:
      class_path: marble.tasks.MedleyDBMelody.datamodule.MedleyDBMelodyTest
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
        fold_idx: 0
        label_freq: 25

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3

lr_scheduler:
  class_path: lightning.pytorch.cli.ReduceLROnPlateau
  init_args:
    mode: "max"
    factor: 0.5
    patience: 5
    monitor: "val/acc_rpa_best"
