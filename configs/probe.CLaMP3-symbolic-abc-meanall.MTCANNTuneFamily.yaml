seed_everything: 1234
ckpt_path: null

# MTC-ANN tune-family retrieval — CLaMP3 symbolic, meanall baseline.
# ABC VARIANT (see probe.CLaMP3-symbolic-abc-layers.MTCANNTuneFamily.yaml):
# mean-of-all-13-layers reference for the per-layer ABC sweep. Same test pool /
# tunefamily relevance as the MTF meanall; tokenised from score-native
# interleaved-ABC. wandb group `CLaMP3-symbolic-abc / MTCANNTuneFamily`
# (shared with the per-layer ABC sweep); save_dir carries the -abc tag so it
# does NOT clobber the MTF meanall. Zero-shot (max_epochs=0), no CV folds.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 0
  num_sanity_val_steps: 0

  callbacks:
    - class_path: marble.modules.callbacks.LogSweepCoordsCallback
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "CLaMP3-symbolic-abc / MTCANNTuneFamily"
      tags: ["CLaMP3-symbolic-abc", "MTCANNTuneFamily", "layer-sweep", "probe", "symbolic", "abc", "mean-all"]
      job_type: "test"
      name: "layer-meanall-test"
      save_dir: "./output/probe.MTCANNTuneFamily.CLaMP3-symbolic-abc-meanall/"


model:
  class_path: marble.tasks.MTCANN.probe.MTCANNTuneFamilyTask
  init_args:
    sample_rate: 24000
    cache_embeddings: true
    log_extended_retrieval_metrics: true

    encoder:
      class_path: marble.encoders.CLaMP3.model.CLaMP3_Symbolic_Encoder

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: ["0..12"]
          mode: mean
      - class_path: marble.modules.transforms.TimeAvgPool


data:
  class_path: marble.tasks.MTCANN.datamodule.MTCANNTuneFamilyABCDataModule
  init_args:
    batch_size: 8
    num_workers: 4

    audio_transforms:
      train: []
      val:   []
      test:  []

    train:
      class_path: marble.tasks.MTCANN.datamodule.MTCANNTuneFamilyABCDummy
    val:
      class_path: marble.tasks.MTCANN.datamodule.MTCANNTuneFamilyABCDummy
    test:
      class_path: marble.tasks.MTCANN.datamodule.MTCANNTuneFamilyABCTest

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
