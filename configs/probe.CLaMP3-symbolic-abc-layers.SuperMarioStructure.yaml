seed_everything: 1234
ckpt_path: null

# SuperMarioStructure — CLaMP3-symbolic per-layer sweep, ABC INPUT.
#
# Base config — the sweep runner overrides `layers: [6]` per layer.
# See the meanall variant + docs/data/supermario_setup.md § Option E
# for the rationale on switching from MIDI/MTF to ABC.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  accumulate_grad_batches: 8
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 40
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 10
  log_every_n_steps: 50

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: "./output/probe.SuperMarioStructure.CLaMP3-symbolic-abc-layers/checkpoints/"
        filename: "best"
        save_top_k: 1
        save_last: true
        monitor: "val/acc"
        mode: "max"
    - class_path: marble.modules.callbacks.LoadLatestCheckpointCallback
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.early_stopping.EarlyStopping
      init_args:
        monitor: "val/acc"
        patience: 7
        mode: "max"
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "CLaMP3-symbolic-abc / SuperMarioStructure"
      tags: ["CLaMP3-symbolic", "SuperMarioStructure", "layer-sweep", "probe", "symbolic", "abc-input"]
      job_type: "fit"
      name: "CLaMP3-symbolic-layers-abc"
      save_dir: "./output/probe.SuperMarioStructure.CLaMP3-symbolic-abc-layers/"


model:
  class_path: marble.tasks.SuperMarioStructure.probe.ProbeAudioTask
  init_args:
    sample_rate: 24000
    cache_embeddings: true
    use_ema: false

    encoder:
      class_path: marble.encoders.CLaMP3.model.CLaMP3_Symbolic_Encoder

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: [6]   # sweep replaces this per-layer
      - class_path: marble.modules.transforms.TimeAvgPool

    decoders:
      - class_path: marble.modules.decoders.MLPDecoder
        init_args:
          in_dim: 768
          out_dim: 6
          hidden_layers: [256]
          activation_fn:
            class_path: torch.nn.ReLU
          dropout: 0.2

    losses:
      - class_path: torch.nn.CrossEntropyLoss
        init_args:
          reduction: mean

    metrics:
      train:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            task: multiclass
            num_classes: 6
        macro_f1:
          class_path: torchmetrics.classification.MulticlassF1Score
          init_args:
            num_classes: 6
            average: macro
      val:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            task: multiclass
            num_classes: 6
        macro_f1:
          class_path: torchmetrics.classification.MulticlassF1Score
          init_args:
            num_classes: 6
            average: macro
      test:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            task: multiclass
            num_classes: 6
        macro_f1:
          class_path: torchmetrics.classification.MulticlassF1Score
          init_args:
            num_classes: 6
            average: macro

data:
  class_path: marble.tasks.SuperMarioStructure.datamodule.SuperMarioStructureDataModule
  init_args:
    batch_size: 4
    num_workers: 4

    audio_transforms:
      train: []
      val: []
      test: []

    train:
      class_path: marble.tasks.SuperMarioStructure.datamodule.SuperMarioStructureSymbolicTrain
      init_args:
        jsonl: data/SuperMarioStructure/SuperMarioStructure.train.jsonl
        input_format: abc
    val:
      class_path: marble.tasks.SuperMarioStructure.datamodule.SuperMarioStructureSymbolicVal
      init_args:
        jsonl: data/SuperMarioStructure/SuperMarioStructure.val.jsonl
        input_format: abc
    test:
      class_path: marble.tasks.SuperMarioStructure.datamodule.SuperMarioStructureSymbolicTest
      init_args:
        jsonl: data/SuperMarioStructure/SuperMarioStructure.test.jsonl
        input_format: abc

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3

lr_scheduler:
  class_path: lightning.pytorch.cli.ReduceLROnPlateau
  init_args:
    mode: "max"
    factor: 0.5
    patience: 5
    monitor: "val/acc"
