seed_everything: 1234
ckpt_path: null

# SuperMarioStructure — Super Mario VGM functional segment classification.
# CLaMP3-symbolic per-layer sweep. PRIMARY representation: MIDI is the
# exact-match input domain (annotations are bar-based, derived from the
# source MUS/MXL scores). Audio is a derivation; the audio configs in
# the same task are secondary.
#
# Pipeline differences vs the audio configs:
#   - Encoder is the CLaMP3 native symbolic BERT (12-layer M3).
#   - Data class returns 4-tuple (patches, label, ori_uid, clip_id);
#     no audio_transforms (the patchilizer is built into the datamodule).
#   - batch_size lowered to 4 — patches are (MAX_PATCHES=512, PATCH_SIZE=64)
#     ints per sample, much bigger than 15-s waveforms.
#   - in_dim 768 — CLaMP3 hidden size.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  accumulate_grad_batches: 8
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 40
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 10
  log_every_n_steps: 50

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: "./output/probe.SuperMarioStructure.CLaMP3-symbolic-layers/checkpoints/"
        filename: "best"
        save_top_k: 1
        save_last: true   # always write last.ckpt so a killed run resumes
        monitor: "val/acc"
        mode: "max"
    - class_path: marble.modules.callbacks.LoadLatestCheckpointCallback
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.early_stopping.EarlyStopping
      init_args:
        monitor: "val/acc"
        patience: 7
        mode: "max"
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "CLaMP3-symbolic / SuperMarioStructure"
      tags: ["CLaMP3-symbolic", "SuperMarioStructure", "layer-sweep", "probe", "symbolic"]
      job_type: "probe"
      name: "CLaMP3-symbolic-layers"
      save_dir: "./output/probe.SuperMarioStructure.CLaMP3-symbolic-layers/"


model:
  class_path: marble.tasks.SuperMarioStructure.probe.ProbeAudioTask
  init_args:
    sample_rate: 24000   # documentation only; symbolic path doesn't use it
    cache_embeddings: true
    use_ema: false

    encoder:
      class_path: marble.encoders.CLaMP3.model.CLaMP3_Symbolic_Encoder

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: [6]   # sweep replaces this
      - class_path: marble.modules.transforms.TimeAvgPool

    decoders:
      - class_path: marble.modules.decoders.MLPDecoder
        init_args:
          in_dim: 768   # CLaMP3 hidden size
          out_dim: 6    # 6 SuperMario functional classes (bridge/intro/linear/loop/outro/stinger)
          hidden_layers: [256]
          activation_fn:
            class_path: torch.nn.ReLU
          dropout: 0.2

    losses:
      - class_path: torch.nn.CrossEntropyLoss
        init_args:
          reduction: mean

    metrics:
      train:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            task: multiclass
            num_classes: 6
        macro_f1:
          class_path: torchmetrics.classification.MulticlassF1Score
          init_args:
            num_classes: 6
            average: macro
      val:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            task: multiclass
            num_classes: 6
        macro_f1:
          class_path: torchmetrics.classification.MulticlassF1Score
          init_args:
            num_classes: 6
            average: macro
      test:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            task: multiclass
            num_classes: 6
        macro_f1:
          class_path: torchmetrics.classification.MulticlassF1Score
          init_args:
            num_classes: 6
            average: macro

data:
  class_path: marble.tasks.SuperMarioStructure.datamodule.SuperMarioStructureDataModule
  init_args:
    batch_size: 4
    num_workers: 4

    # No audio_transforms — the symbolic datamodule returns M3 patches directly.
    audio_transforms:
      train: []
      val: []
      test: []

    train:
      class_path: marble.tasks.SuperMarioStructure.datamodule.SuperMarioStructureSymbolicTrain
      init_args:
        jsonl: data/SuperMarioStructure/SuperMarioStructure.train.jsonl
    val:
      class_path: marble.tasks.SuperMarioStructure.datamodule.SuperMarioStructureSymbolicVal
      init_args:
        jsonl: data/SuperMarioStructure/SuperMarioStructure.val.jsonl
    test:
      class_path: marble.tasks.SuperMarioStructure.datamodule.SuperMarioStructureSymbolicTest
      init_args:
        jsonl: data/SuperMarioStructure/SuperMarioStructure.test.jsonl

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3

lr_scheduler:
  class_path: lightning.pytorch.cli.ReduceLROnPlateau
  init_args:
    mode: "max"
    factor: 0.5
    patience: 5
    monitor: "val/acc"
