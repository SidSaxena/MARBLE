seed_everything: 1234
ckpt_path: null

# SHS-100K zero-shot cover-song retrieval — CLaMP3 variant.
# See probe.OMARRQ-multifeature25hz.SHS100K.yaml for full explanation.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: 16
  max_epochs: 0
  num_sanity_val_steps: 0

  callbacks: []
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "CLaMP3-layers / SHS100K"
      tags: ["CLaMP3-layers", "SHS100K", "layer-sweep"]
      job_type: "probe"
      name: "CLaMP3-layers"
      save_dir: "./output/probe.SHS100K.CLaMP3-layers/"


model:
  class_path: marble.tasks.SHS100K.probe.CoverRetrievalTask
  init_args:
    sample_rate: 24000

    encoder:
      class_path: marble.encoders.CLaMP3.model.CLaMP3_Encoder
      init_args:
        pre_trained_folder: null
        train_mode: freeze

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: [6]   # sweep replaces this
      - class_path: marble.modules.transforms.TimeAvgPool


data:
  class_path: marble.tasks.SHS100K.datamodule.SHS100KDataModule
  init_args:
    batch_size: 8
    num_workers: 4

    audio_transforms:
      train:
        - class_path: marble.encoders.CLaMP3.model.CLaMP3_FeatureExtractor
          init_args:
            pre_trained_folder: null
            squeeze: true
      val:
        - class_path: marble.encoders.CLaMP3.model.CLaMP3_FeatureExtractor
          init_args:
            pre_trained_folder: null
            squeeze: true
      test:
        - class_path: marble.encoders.CLaMP3.model.CLaMP3_FeatureExtractor
          init_args:
            pre_trained_folder: null
            squeeze: true

    train:
      class_path: marble.tasks.SHS100K.datamodule.SHS100KAudioDummy
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 30.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/SHS100K/SHS100K.test.jsonl
        backend: null
    val:
      class_path: marble.tasks.SHS100K.datamodule.SHS100KAudioDummy
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 30.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/SHS100K/SHS100K.test.jsonl
        backend: null
    test:
      class_path: marble.tasks.SHS100K.datamodule.SHS100KAudioAll
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 30.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/SHS100K/SHS100K.test.jsonl
        backend: null

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
