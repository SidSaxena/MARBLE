seed_everything: 1234
ckpt_path: null

# GS key detection — MERT-v1-330M per-layer sweep.
# Settings match probe.OMARRQ-multifeature25hz.GS.yaml for fair comparison.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  accumulate_grad_batches: 8
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 60   # wandb audit: ~10–20% of GS layer runs hit max_epochs=40 with the model still improving; 60 gives slack
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 10
  log_every_n_steps: 5

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: "./output/probe.GS.MERT-v1-330M-meanall/checkpoints/"
        filename: "best"
        save_top_k: 1
    - class_path: marble.modules.callbacks.LoadLatestCheckpointCallback
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.early_stopping.EarlyStopping
      init_args:
        monitor: "val/weighted_score"
        patience: 7
        mode: "max"
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "MERT-v1-330M-meanall / GS"
      tags: ["MERT-v1-330M", "GS", "layer-sweep", "probe", "mean-all"]
      job_type: "probe"
      name: "meanall-fit"
      save_dir: "./output/probe.GS.MERT-v1-330M-meanall/"


model:
  class_path: marble.tasks.GS.probe.ProbeAudioTask
  init_args:
    sample_rate: 24000
    use_ema: false

    encoder:
      class_path: marble.encoders.MERT.model.MERT_v1_330M_Encoder
      init_args:
        pre_trained_folder: null
        train_mode: freeze
        force_half: false
        preprocess_in_forward: false

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: ["0..24"]
          mode: mean
      - class_path: marble.modules.transforms.TimeAvgPool

    decoders:
      - class_path: marble.modules.decoders.MLPDecoder
        init_args:
          in_dim: 1024  # MERT-v1-330M hidden size
          out_dim: 24    # 24 keys (12 major + 12 minor)
          hidden_layers: [256]
          activation_fn:
            class_path: torch.nn.ReLU
          dropout: 0.2

    losses:
      - class_path: torch.nn.CrossEntropyLoss
        init_args:
          reduction: mean

    metrics:
      train:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            num_classes: 24
            task: multiclass
        weighted_score:
          class_path: marble.tasks.GS.probe.KeyWeightedScore
      val:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            num_classes: 24
            task: multiclass
        weighted_score:
          class_path: marble.tasks.GS.probe.KeyWeightedScore
      test:
        acc:
          class_path: torchmetrics.Accuracy
          init_args:
            num_classes: 24
            task: multiclass
        weighted_score:
          class_path: marble.tasks.GS.probe.KeyWeightedScore

data:
  class_path: marble.tasks.GS.datamodule.GSDataModule
  init_args:
    batch_size: 16
    num_workers: 8

    audio_transforms:
      train:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: "m-a-p/MERT-v1-330M"
            squeeze: true
      val:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: "m-a-p/MERT-v1-330M"
            squeeze: true
      test:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: "m-a-p/MERT-v1-330M"
            squeeze: true

    train:
      class_path: marble.tasks.GS.datamodule.GSAudioTrain
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 30
        min_clip_ratio: 0.8
        channel_mode: first
        jsonl: data/GS/GS.train.jsonl
    val:
      class_path: marble.tasks.GS.datamodule.GSAudioVal
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 30
        min_clip_ratio: 0.8
        channel_mode: first
        jsonl: data/GS/GS.val.jsonl
    test:
      class_path: marble.tasks.GS.datamodule.GSAudioTest
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 30
        min_clip_ratio: 0.8
        channel_mode: first
        jsonl: data/GS/GS.test.jsonl

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3

lr_scheduler:
  class_path: lightning.pytorch.cli.ReduceLROnPlateau
  init_args:
    mode: "max"
    factor: 0.5
    patience: 3
    monitor: "val/weighted_score"
