seed_everything: 1234
ckpt_path: null

# MTC-ANN motif retrieval — CLaMP3 symbolic, per-layer sweep.
# ABC VARIANT: each annotated motif occurrence is tokenised from a score-native
# interleaved-ABC string (data/MTC-ANN/MTCANN.Motif.ABC.jsonl `abc`
# field), preserving key / pitch-spelling / meter / bars instead of the lossy
# MIDI->MTF path. Same test pool / (tunefamily, motif) relevance as the MTF arm,
# so the per-layer MAP is a clean A/B. wandb group `CLaMP3-symbolic-abc /
# MTCANNMotif` (representation in the repr, not the task) keeps the A/B
# separate; save_dir carries the -abc tag so it does NOT clobber the MTF dirs.
# Zero-shot (max_epochs=0), no CV folds. Build the dataset first:
#   uv run python scripts/data/build_mtc_ann_retrieval.py
# The sweep runner overrides the single-int `layers: [6]` below per layer.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 0
  num_sanity_val_steps: 0

  callbacks:
    - class_path: marble.modules.callbacks.LogSweepCoordsCallback
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "CLaMP3-symbolic-abc / MTCANNMotif"
      tags: ["CLaMP3-symbolic-abc", "MTCANNMotif", "layer-sweep", "probe", "symbolic", "abc"]
      job_type: "test"
      name: "layer-6-test"
      save_dir: "./output/probe.MTCANNMotif.CLaMP3-symbolic-abc-layers/"


model:
  class_path: marble.tasks.MTCANN.probe.MTCANNMotifTask
  init_args:
    sample_rate: 24000
    cache_embeddings: true
    log_extended_retrieval_metrics: true

    encoder:
      class_path: marble.encoders.CLaMP3.model.CLaMP3_Symbolic_Encoder

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: [6]   # sweep replaces this per-layer
      - class_path: marble.modules.transforms.TimeAvgPool


data:
  class_path: marble.tasks.MTCANN.datamodule.MTCANNMotifABCDataModule
  init_args:
    batch_size: 8
    num_workers: 4

    audio_transforms:
      train: []
      val:   []
      test:  []

    train:
      class_path: marble.tasks.MTCANN.datamodule.MTCANNMotifABCDummy
    val:
      class_path: marble.tasks.MTCANN.datamodule.MTCANNMotifABCDummy
    test:
      class_path: marble.tasks.MTCANN.datamodule.MTCANNMotifABCTest

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
