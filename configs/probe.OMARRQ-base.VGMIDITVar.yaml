seed_everything: 1234
ckpt_path: null

# ── OMAR-RQ × VGMIDITVar — variant: omar-rq-base (MEL input, 16 kHz) ──────
# Per upstream README, "base" / "multicodebook" are mel-spectrogram-based
# and "tend to perform better on semantic tasks such as auto-tagging,
# structure recognition, difficulty estimation". Theme→variation retrieval
# IS a structural / semantic task, so plausibly a better fit than the
# audio-input multifeature variants. Worth one test.
#
# Important: this variant is trained at 16 kHz, not 24 kHz. The
# OMARRQ_Multifeature25hz_Encoder reads sr from the loaded model, but the
# dataloader (sample_rate below) must resample to 16 kHz on disk.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 0
  num_sanity_val_steps: 0

  callbacks: []
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "OMARRQ-base / VGMIDITVar"
      tags: ["OMARRQ-base", "VGMIDITVar", "variant-swap", "mel", "probe"]
      job_type: "probe"
      name: "base-test"
      save_dir: "./output/probe.VGMIDITVar.OMARRQ-base/"


model:
  class_path: marble.tasks.VGMIDITVar.probe.CoverRetrievalTask
  init_args:
    sample_rate: 16000

    encoder:
      class_path: marble.encoders.OMAR_RQ.model.OMARRQ_Multifeature25hz_Encoder
      init_args:
        model_id: "mtg-upf/omar-rq-base"

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: ["0..23"]
          mode: mean
      - class_path: marble.modules.transforms.TimeAvgPool

data:
  class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarDataModule
  init_args:
    batch_size: 8
    num_workers: 4

    audio_transforms:
      train:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      val:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor
      test:
        - class_path: marble.encoders.OMAR_RQ.model.OMARRQ_FeatureExtractor

    train:
      class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarAudioDummy
      init_args:
        jsonl: data/VGMIDITVar/VGMIDITVar.jsonl
        sample_rate: 16000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
    val:
      class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarAudioDummy
      init_args:
        jsonl: data/VGMIDITVar/VGMIDITVar.jsonl
        sample_rate: 16000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
    test:
      class_path: marble.tasks.VGMIDITVar.datamodule.VGMIDITVarAudioAll
      init_args:
        jsonl: data/VGMIDITVar/VGMIDITVar.jsonl
        sample_rate: 16000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
