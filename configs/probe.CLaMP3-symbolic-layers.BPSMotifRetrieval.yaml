seed_everything: 1234
ckpt_path: null

# BPS-Motif within-piece within-letter motif retrieval — CLaMP3 symbolic, per-layer sweep.
# Base config — the sweep runner overrides the single-int `layers: [6]`
# below to produce one config per layer (0..12).

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 0
  num_sanity_val_steps: 0

  callbacks: []
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "CLaMP3-symbolic / BPSMotifRetrieval"
      tags: ["CLaMP3-symbolic", "BPSMotifRetrieval", "layer-sweep", "probe", "symbolic"]
      job_type: "test"
      name: "layer-6-test"
      save_dir: "./output/probe.BPSMotifRetrieval.CLaMP3-symbolic-layers/"


model:
  class_path: marble.tasks.BPSMotif.probe.BPSMotifRetrievalTask
  init_args:
    sample_rate: 24000
    cache_embeddings: true

    encoder:
      class_path: marble.encoders.CLaMP3.model.CLaMP3_Symbolic_Encoder

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: [6]   # sweep replaces this per-layer
      - class_path: marble.modules.transforms.TimeAvgPool


data:
  class_path: marble.tasks.BPSMotif.datamodule.BPSMotifRetrievalDataModule
  init_args:
    batch_size: 8
    num_workers: 4

    audio_transforms:
      train: []
      val:   []
      test:  []

    train:
      class_path: marble.tasks.BPSMotif.datamodule.BPSMotifRetrievalDummy
      init_args:
        fold_idx: 0
    val:
      class_path: marble.tasks.BPSMotif.datamodule.BPSMotifRetrievalDummy
      init_args:
        fold_idx: 0
    test:
      class_path: marble.tasks.BPSMotif.datamodule.BPSMotifRetrievalTest
      init_args:
        fold_idx: 0

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
