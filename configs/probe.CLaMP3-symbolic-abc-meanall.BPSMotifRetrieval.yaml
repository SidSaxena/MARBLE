seed_everything: 1234
ckpt_path: null

# BPS-Motif within-piece within-letter motif retrieval — CLaMP3 symbolic
# meanall, ABC INPUT (Option B).
#
# Mean-of-all-13-layers baseline for the ABC arm of the BPS-Motif Retrieval A/B.
# Zero-shot (max_epochs=0). Same task / 5-fold CV / (piece_id, motif_letter)
# work_id as the MTF meanall, but tokenised from the notation-preserving
# interleaved-ABC strings (build_bps_motif_abc.py). wandb group
# `CLaMP3-symbolic-abc / BPSMotifRetrieval` (shared with the per-layer ABC
# sweep); save_dir carries the -abc tag so it does NOT clobber the MTF meanall.
# Build the ABC dataset first:
#   uv run python scripts/data/build_bps_motif_abc.py

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 0
  num_sanity_val_steps: 0

  callbacks:
    - class_path: marble.modules.callbacks.LogSweepCoordsCallback
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "CLaMP3-symbolic-abc / BPSMotifRetrieval"
      tags: ["CLaMP3-symbolic-abc", "BPSMotifRetrieval", "layer-sweep", "probe", "symbolic", "abc-input", "mean-all"]
      job_type: "test"
      name: "layer-meanall-test"
      save_dir: "./output/probe.BPSMotifRetrieval.CLaMP3-symbolic-abc-meanall/"


model:
  class_path: marble.tasks.BPSMotif.probe.BPSMotifRetrievalTask
  init_args:
    sample_rate: 24000
    cache_embeddings: true
    log_extended_retrieval_metrics: true

    encoder:
      class_path: marble.encoders.CLaMP3.model.CLaMP3_Symbolic_Encoder

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: ["0..12"]
          mode: mean
      - class_path: marble.modules.transforms.TimeAvgPool


data:
  class_path: marble.tasks.BPSMotif.datamodule.BPSMotifRetrievalABCDataModule
  init_args:
    batch_size: 8
    num_workers: 4

    audio_transforms:
      train: []
      val:   []
      test:  []

    train:
      class_path: marble.tasks.BPSMotif.datamodule.BPSMotifRetrievalABCDummy
      init_args:
        fold_idx: 0
    val:
      class_path: marble.tasks.BPSMotif.datamodule.BPSMotifRetrievalABCDummy
      init_args:
        fold_idx: 0
    test:
      class_path: marble.tasks.BPSMotif.datamodule.BPSMotifRetrievalABCTest
      init_args:
        fold_idx: 0

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3
