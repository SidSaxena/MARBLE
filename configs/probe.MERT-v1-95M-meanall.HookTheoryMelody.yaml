seed_everything: 1234
ckpt_path: null

# HookTheoryMelody — frame-level melody pitch classification.
# MERT token rate is 75 Hz → label_freq=75 (per-frame alignment).
# Frame-level task → NO TimeAvgPool, decoder preserves the time dimension.

trainer:
  fast_dev_run: false
  accelerator: gpu
  devices: [0]
  accumulate_grad_batches: 8
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: 40
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 10
  log_every_n_steps: 50

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: "./output/probe.HookTheoryMelody.MERT-v1-95M-meanall/checkpoints/"
        filename: "best"
        save_top_k: 1
        monitor: "val/acc_rpa"
        mode: "max"
    - class_path: marble.modules.callbacks.LoadLatestCheckpointCallback
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.early_stopping.EarlyStopping
      init_args:
        monitor: "val/acc_rpa"
        patience: 7
        mode: "max"
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: "marble"
      group: "MERT-v1-95M / HookTheoryMelody"
      tags: ["MERT-v1-95M", "HookTheoryMelody", "layer-sweep", "probe", "mean-all", "layer-meanall"]
      job_type: "probe"
      name: "layer-meanall-fit"
      save_dir: "./output/probe.HookTheoryMelody.MERT-v1-95M-meanall/"


model:
  class_path: marble.tasks.HookTheoryMelody.probe.ProbeAudioTask
  init_args:
    sample_rate: 24000
    use_ema: false

    encoder:
      class_path: marble.encoders.MERT.model.MERT_v1_95M_Encoder
      init_args:
        pre_trained_folder: null
        train_mode: freeze
        force_half: false
        preprocess_in_forward: false

    emb_transforms:
      - class_path: marble.modules.transforms.LayerSelector
        init_args:
          layers: ["0..12"]
          mode: mean
      # NO TimeAvgPool — preserve the time dimension for per-frame labels

    decoders:
      - class_path: marble.modules.decoders.MLPDecoderKeepTime
        init_args:
          in_dim: 768    # MERT-v1-95M hidden size
          out_dim: 128   # full MIDI range 0..127 (unused indices simply unused)
          hidden_layers: [256]
          activation_fn:
            class_path: torch.nn.ReLU
          dropout: 0.2

    losses:
      - class_path: marble.tasks.HookTheoryMelody.probe.MelodyCrossEntropyLoss
        init_args:
          time_dim_mismatch_tol: 5
          ignore_index: -1

    metrics:
      train:
        acc_rpa:
          class_path: marble.tasks.HookTheoryMelody.probe.RawPitchAccuracy
          init_args:
            time_dim_mismatch_tol: 5
            ignore_index: -1
        acc_rca:
          class_path: marble.tasks.HookTheoryMelody.probe.RawChromaAccuracy
          init_args:
            time_dim_mismatch_tol: 5
            ignore_index: -1
      val:
        acc_rpa:
          class_path: marble.tasks.HookTheoryMelody.probe.RawPitchAccuracy
          init_args:
            time_dim_mismatch_tol: 5
            ignore_index: -1
        acc_rca:
          class_path: marble.tasks.HookTheoryMelody.probe.RawChromaAccuracy
          init_args:
            time_dim_mismatch_tol: 5
            ignore_index: -1
      test:
        acc_rpa:
          class_path: marble.tasks.HookTheoryMelody.probe.RawPitchAccuracy
          init_args:
            time_dim_mismatch_tol: 5
            ignore_index: -1
        acc_rca:
          class_path: marble.tasks.HookTheoryMelody.probe.RawChromaAccuracy
          init_args:
            time_dim_mismatch_tol: 5
            ignore_index: -1

data:
  class_path: marble.tasks.HookTheoryMelody.datamodule.HookTheoryMelodyDataModule
  init_args:
    batch_size: 8
    num_workers: 8

    audio_transforms:
      train:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: null
            squeeze: true
      val:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: null
            squeeze: true
      test:
        - class_path: marble.encoders.MERT.model.MERT_v1_95M_FeatureExtractor
          init_args:
            pre_trained_folder: null
            squeeze: true

    train:
      class_path: marble.tasks.HookTheoryMelody.datamodule.HookTheoryMelodyTrain
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: random
        jsonl: data/HookTheory/HookTheory.train.jsonl
        label_freq: 75
        audio_dir: data/HookTheory/audio
    val:
      class_path: marble.tasks.HookTheoryMelody.datamodule.HookTheoryMelodyVal
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/HookTheory/HookTheory.val.jsonl
        label_freq: 75
        audio_dir: data/HookTheory/audio
    test:
      class_path: marble.tasks.HookTheoryMelody.datamodule.HookTheoryMelodyTest
      init_args:
        sample_rate: 24000
        channels: 1
        clip_seconds: 15.0
        min_clip_ratio: 0.5
        channel_mode: mix
        jsonl: data/HookTheory/HookTheory.test.jsonl
        label_freq: 75
        audio_dir: data/HookTheory/audio

optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 1e-3

lr_scheduler:
  class_path: lightning.pytorch.cli.ReduceLROnPlateau
  init_args:
    mode: "max"
    factor: 0.5
    patience: 5
    monitor: "val/acc_rpa"
