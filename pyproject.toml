# Install system deps before running `uv sync`:
#   macOS:  brew install ffmpeg
#   Linux:  sudo apt install ffmpeg

[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "marble"
version = "0.2.0"
description = "Marble: a framework for SSL-based audio tasks"
requires-python = ">=3.10"
authors = [
  { name = "Ruibin Yuan" },
]
dependencies = [
    "lightning==2.5.1",
    "torch==2.6.0",
    "torchaudio==2.6.0",
    "jsonargparse[signatures]>=4.27.7",
    "albumentations==1.4.4",
    "transformers==4.52.3",
    "datasets==3.6.0",
    "peft==0.15.2",
    "einops",
    "requests",
    "librosa",
    "omegaconf",
    "wandb",
    "mir_eval",
    "pretty_midi",
    "yt-dlp",        # download_hooktheory.py
    "numpy>=1.19",
    "scipy>=1.5",
    "numba",         # GTZANBeatTracking HMM (replaces the old Cython extension)
    "omar-rq @ git+https://github.com/MTG/omar-rq.git",  # OMARRQ encoder
]

[project.optional-dependencies]
# uv sync --extra xcodec
xcodec = [
    "descript-audiotools @ git+https://github.com/descriptinc/audiotools",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["marble", "marble.*"]

# ── uv: PyTorch CUDA wheels (Linux / GPU machine) ────────────────────────────
# On macOS, the default PyPI CPU-only builds are used automatically.
# On Linux, torch and torchaudio are fetched from the CUDA 12.4 index instead.
# Change cu124 → cu128 etc. if your driver supports a newer toolkit version.
[[tool.uv.index]]
name = "pytorch-cu124"
url = "https://download.pytorch.org/whl/cu124"
explicit = true

[tool.uv.sources]
torch = [
  { index = "pytorch-cu124", marker = "sys_platform != 'darwin'" },
]
torchaudio = [
  { index = "pytorch-cu124", marker = "sys_platform != 'darwin'" },
]
